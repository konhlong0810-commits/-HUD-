plugins {
    id 'com.android.application'
}
android {
    namespace 'com.dino.hud'
    compileSdk 34
    defaultConfig {
        applicationId "com.dino.hud"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "0.0.1Data"
    }
    buildTypes {
        release {
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
dependencies {
    implementation 'androidx.webkit:webkit:1.9.0'
}
